<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TREY · sign in</title>
    <!-- Font Awesome for subtle icons (adds polish without changing logic) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, sans-serif;
        background: #fafaf8; /* TREY off-white */
        color: #1e1e1e;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 1.5rem;
        margin: 0;
        line-height: 1.5;
        background-image: radial-gradient(
            circle at 20% 40%,
            rgba(0, 0, 0, 0.02) 0%,
            transparent 30%
          ),
          radial-gradient(
            circle at 90% 80%,
            rgba(0, 0, 0, 0.02) 0%,
            transparent 30%
          );
        animation: bgFade 1.2s ease;
      }

      @keyframes bgFade {
        0% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }

      .signin-card {
        background: #ffffff;
        border: 1px solid #eaeae4;
        width: 95%;
        padding: 2.8rem 2.5rem;
        box-shadow: 0 25px 45px -20px rgba(0, 0, 0, 0.08);
        transition: box-shadow 0.4s ease, transform 0.3s ease;
        animation: cardAppear 0.7s cubic-bezier(0.12, 0.71, 0.33, 1);
      }

      .signin-card:hover {
        box-shadow: 0 30px 50px -25px rgba(0, 0, 0, 0.12);
      }

      @keyframes cardAppear {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .brand-header {
        margin-bottom: 2.2rem;
        text-align: left;
        border-bottom: 1px solid #efefe9;
        padding-bottom: 1.2rem;
      }

      .brand-logo {
        font-size: 2rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #252523;
        line-height: 1;
      }

      .brand-logo span {
        font-weight: 280;
        color: #7c7c7a;
      }

      .brand-tagline {
        font-size: 0.9rem;
        font-weight: 320;
        color: #6f6f69;
        margin-top: 0.3rem;
        letter-spacing: 0.3px;
      }

      .form-title {
        font-size: 1.6rem;
        font-weight: 380;
        letter-spacing: -0.02em;
        color: #252523;
        margin-bottom: 0.2rem;
      }

      .form-sub {
        font-size: 0.95rem;
        color: #6b6b66;
        font-weight: 320;
        margin-bottom: 2rem;
        border-left: 2px solid #d4d4ce;
        padding-left: 1rem;
      }

      .trey-form {
        display: flex;
        flex-direction: column;
        gap: 1.8rem;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }

      .input-label {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: #4a4a46;
        font-weight: 400;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .input-label i {
        font-size: 0.9rem;
        color: #b5b5ad;
        width: 18px;
      }

      .input-field {
        background: transparent;
        border: none;
        border-bottom: 1px solid #d7d7d0;
        padding: 0.7rem 0.2rem 0.7rem 0.2rem;
        font-size: 1.1rem;
        font-weight: 320;
        color: #232321;
        outline: none;
        transition: border-color 0.2s, background 0.2s;
        font-family: inherit;
        width: 100%;
      }

      .input-field:focus {
        border-bottom-color: #232321;
        background: #fcfcf9;
      }

      .input-field::placeholder {
        color: #c3c3bb;
        font-weight: 280;
        font-size: 0.95rem;
      }

      .signin-btn {
        background: #232321;
        border: 1px solid #232321;
        color: white;
        padding: 1.1rem 1.5rem;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 2.2px;
        font-weight: 400;
        cursor: pointer;
        transition: all 0.25s ease;
        margin: 0.8rem 0 0.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        border-radius: 0;
        position: relative;
        overflow: hidden;
      }

      .signin-btn:hover {
        background: #3b3b38;
        border-color: #3b3b38;
      }

      .signin-btn:active {
        transform: scale(0.98);
      }

      .signin-btn i {
        transition: transform 0.2s;
      }

      .signin-btn:hover i {
        transform: translateX(4px);
      }

      .status-area {
        margin-top: 1.2rem;
        padding: 1rem 1rem;
        font-size: 0.95rem;
        font-weight: 340;
        border: 1px solid #efefe9;
        background: #f9f9f6;
        display: flex;
        align-items: center;
        gap: 10px;
        color: #3b3b38;
        transition: all 0.2s;
        min-height: 60px;
      }

      .status-area i {
        font-size: 1.2rem;
        color: #b5b5ad;
      }

      .status-area.success {
        border-left: 4px solid #c9a46c;
        background: #fcf9f5;
      }

      .status-area.error {
        border-left: 4px solid #d86767;
        background: #fdf8f8;
      }

      .legal-note {
        margin-top: 2rem;
        font-size: 0.8rem;
        color: #a3a39b;
        text-align: center;
        border-top: 1px solid #efefe9;
        padding-top: 1.2rem;
        letter-spacing: 0.3px;
      }

      .legal-note a {
        color: #6b6b64;
        text-decoration: none;
        border-bottom: 1px dotted #cbcbc3;
      }

      .legal-note a:hover {
        color: #232321;
        border-bottom: 1px solid #232321;
      }

      .forgot-link {
        text-align: right;
        margin-top: -0.8rem;
        font-size: 0.85rem;
      }

      .forgot-link a {
        color: #8a8a84;
        text-decoration: none;
        border-bottom: 1px dotted #d4d4ce;
      }

      .forgot-link a:hover {
        color: #232321;
      }

      /* responsive */
      @media (max-width: 480px) {
        .signin-card {
          padding: 2rem 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="signin-card">
      <div class="brand-header">
        <div class="brand-logo">OJ || studios</div>
        <div class="brand-tagline">first acess merch · member access</div>
      </div>

      <div class="form-title">welcome back</div>
      <div class="form-sub">sign in to your account</div>

      <form id="loginForm" class="trey-form">
        <div class="input-group">
          <label for="email" class="input-label"
            ><i class="fa-regular fa-envelope"></i> email</label
          >
          <input
            type="email"
            id="email"
            name="email"
            placeholder="your@email.com"
            class="input-field"
            required
          />
        </div>

        <div class="input-group">
          <label for="password" class="input-label"
            ><i class="fa-solid fa-lock"></i>password</label
          >
          <input
            type="password"
            id="password"
            name="password"
            placeholder="··········"
            class="input-field"
            required
          />
        </div>

        <div class="forgot-link">
          <a href="signup.html">Sign Up?</a>
        </div>

        <button type="submit" class="signin-btn">
          sign in <i class="fa-solid fa-arrow-right-to-bracket"></i>
        </button>

        <div id="status" class="status-area">
          <i class="fa-solid fa-circle" style="color: rgb(240, 240, 30)"></i>
          <span>ready to sign in</span>
        </div>
      </form>

      <div class="legal-note">
        secure access · <a href="#">privacy</a> · <a href="#">help</a>
      </div>
    </div>

    <script>
      const form = document.getElementById("loginForm");
      const statusDiv = document.getElementById("status");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        statusDiv.classList.remove("success", "error");

        const formData = new FormData(form);
        const data = {
          email: formData.get("email"),
          password: formData.get("password"),
        };

        try {
          const res = await fetch(
            "https://backendroutes-lcpt.onrender.com/loginoj",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(data),
            }
          );

          const result = await res.json();

          sessionStorage.setItem("isLoggedIn", "yes");
          sessionStorage.setItem("userId", result.userId);
          sessionStorage.setItem("userName", result.userName);

          statusDiv.textContent = result.message;

          if (res.ok) {
            statusDiv.classList.add("success");
            statusDiv.innerHTML = `<i class="fa-regular fa-circle-check" style="color:#c9a46c;"></i> <span>${result.message}</span>`;
            setTimeout(() => {
              window.location.href = "index.html";
            }, 2000);
          } else {
            statusDiv.classList.add("error");
            statusDiv.innerHTML = `<i class="fa-regular fa-circle-exclamation" style="color:#d86767;"></i> <span>${result.message}</span>`;
          }
        } catch (err) {
          console.error(err);
          statusDiv.classList.add("error");
          statusDiv.innerHTML = `<i class="fa-regular fa-circle-exclamation" style="color:#d86767;"></i> <span>connection error</span>`;
        }
      });
    </script>
  </body>
</html>
